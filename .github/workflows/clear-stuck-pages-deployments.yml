name: Clear stuck Pages deployments

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  clear:
    runs-on: ubuntu-latest
    steps:
      - name: Clear non-final github-pages deployments
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const deployments = await github.paginate(github.rest.repos.listDeployments, {
              owner,
              repo,
              environment: 'github-pages',
              per_page: 100
            });
            const finalStates = new Set(['success', 'failure', 'error', 'inactive']);
            for (const deployment of deployments) {
              const statuses = await github.paginate(github.rest.repos.listDeploymentStatuses, {
                owner,
                repo,
                deployment_id: deployment.id,
                per_page: 100
              });
              const latest = statuses[0]?.state || 'unknown';
              if (!finalStates.has(latest)) {
                core.info(`Marking deployment ${deployment.id} (${deployment.sha}) as inactive from ${latest}`);
                await github.rest.repos.createDeploymentStatus({
                  owner,
                  repo,
                  deployment_id: deployment.id,
                  state: 'inactive',
                  auto_inactive: false
                });
              }
            }
